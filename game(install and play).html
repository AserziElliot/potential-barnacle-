<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE WHISPERING WALLS - Proyecto Omega</title>
    <style>
        /* ================================================================
           DISEÑO ATMOSFÉRICO DE TERROR PSICOLÓGICO
           Este bloque define la identidad visual del juego: "Digital Decay".
           ================================================================
        */

        :root {
            --primary-bg: #020202;
            --text-main: #b0b0b0;
            --blood-red: #660000;
            --glitch-cyan: #00ffff;
            --glitch-magenta: #ff00ff;
            --terminal-green: #1aff1a;
            --shadow-depth: rgba(0, 0, 0, 0.95);
            --font-pixel: 'Courier New', Courier, monospace;
            --vignette-intensity: 60%;
        }

        /* Reset y Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: var(--font-pixel);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* EFECTO CRT Y ESCANEO (Para la sensación de monitor viejo) */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.1) 50%
            ), 
            linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.03), 
                rgba(0, 255, 0, 0.01), 
                rgba(0, 0, 255, 0.03)
            );
            background-size: 100% 3px, 3px 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .crt-overlay::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(
                to bottom,
                rgba(18, 16, 16, 0) 0%,
                rgba(18, 16, 16, 0.15) 50%,
                rgba(18, 16, 16, 0) 100%
            );
            background-size: 100% 10%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* CONTENEDOR PRINCIPAL */
        #master-container {
            width: 90vw;
            height: 90vh;
            max-width: 1000px;
            max-height: 700px;
            position: relative;
            border: 2px solid #1a1a1a;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
        }

        /* VIÑETA DINÁMICA (Se encoge con la cordura) */
        .vignette {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            z-index: 5;
            transition: box-shadow 2s ease;
        }

        /* HEADER Y ESTADÍSTICAS */
        .game-header {
            height: 60px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
            background-color: #050505;
            z-index: 10;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-bar-container {
            width: 120px;
            height: 4px;
            background: #111;
            position: relative;
        }

        #sanity-bar {
            width: 100%;
            height: 100%;
            background: var(--blood-red);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--blood-red);
        }

        /* ÁREA DE JUEGO PRINCIPAL */
        #viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
            position: relative;
            scrollbar-width: none; /* Firefox */
        }

        #viewport::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        /* TEXTO NARRATIVO */
        .message {
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: 1.1rem;
            opacity: 0;
            transform: translateY(10px);
            animation: emerge 0.8s forwards;
        }

        @keyframes emerge {
            to { opacity: 1; transform: translateY(0); }
        }

        .whisper-text {
            color: #444;
            font-style: italic;
            font-size: 0.9rem;
            display: block;
            margin-top: 10px;
        }

        /* PANEL DE ACCIONES */
        #action-panel {
            min-height: 150px;
            background: #030303;
            border-top: 1px solid #1a1a1a;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
            z-index: 10;
        }

        .action-btn {
            background: #080808;
            border: 1px solid #222;
            color: #555;
            padding: 15px;
            font-family: var(--font-pixel);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            border-color: #444;
            color: #eee;
            background: #0c0c0c;
        }

        .action-btn:active {
            background: var(--blood-red);
            color: white;
        }

        /* EFECTOS DE GLITCH (Se activarán vía JS) */
        .glitch-active {
            animation: glitch-anim 0.2s infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); text-shadow: -2px 0 var(--glitch-cyan), 2px 0 var(--glitch-magenta); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); filter: hue-rotate(90deg); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0); }
        }

        /* SISTEMA DE NOTIFICACIONES TIPO LOG */
        #event-log {
            position: absolute;
            bottom: 170px;
            left: 20px;
            font-size: 0.65rem;
            color: #222;
            pointer-events: none;
        }

        /* MARCADORES DE INVENTARIO */
        #inventory-display {
            display: flex;
            gap: 10px;
            position: absolute;
            right: 20px;
            bottom: 170px;
        }

        .inv-slot {
            width: 30px;
            height: 30px;
            border: 1px solid #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: #333;
        }

    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    
    <div id="master-container">
        <div class="vignette" id="main-vignette"></div>

        <header class="game-header">
            <div class="stat-group">
                <span class="stat-label">Estado Mental</span>
                <div class="progress-bar-container">
                    <div id="sanity-bar"></div>
                </div>
            </div>
            <div class="stat-group" style="align-items: flex-end;">
                <span class="stat-label">Sincronización</span>
                <span id="sync-value" style="color: var(--terminal-green); font-size: 0.8rem;">100%</span>
            </div>
        </header>

        <main id="viewport">
            </main>

        <div id="event-log">SISTEMA_INICIALIZADO...</div>
        
        <div id="inventory-display">
            <div class="inv-slot" title="Vacío">?</div>
            <div class="inv-slot" title="Vacío">?</div>
            <div class="inv-slot" title="Vacío">?</div>
        </div>

        <footer id="action-panel">
            </footer>
    </div>

    <script>
        /* PARTE 2: EL MOTOR LÓGICO Y EL "CORE" DE DATOS
           (Continuará en la siguiente respuesta...)
        */
      /**
         * ================================================================
         * PARTE 2: EL MOTOR DE PROCESAMIENTO NARRATIVO
         * Este módulo gestiona cómo fluye la historia y cómo reacciona
         * el mundo a la pérdida de cordura del jugador.
         * ================================================================
         */

        const State = {
            sanity: 100,
            sync: 100,
            inventory: [],
            currentScene: 'limbo_inicial',
            flags: new Set(), // Para eventos únicos (ej. 'llave_recogida')
            isWriting: false,
            turnCount: 0
        };

        const GameEngine = {
            
            // 1. INICIALIZACIÓN DEL SISTEMA
            boot() {
                console.log("%c SISTEMA DE TRAUMA INICIALIZADO ", "background: #8b0000; color: white;");
                this.updateUI();
                this.loadScene(State.currentScene);
                this.startPulse();
            },

            // 2. MOTOR TYPEWRITER (Efecto de escritura con pausas)
            // Diseñado para simular una presencia que duda al hablar.
            async typeWriter(element, text) {
                State.isWriting = true;
                element.innerHTML = "";
                
                let i = 0;
                const baseSpeed = 35; // ms por carácter
                
                // Creamos un cursor parpadeante
                const cursor = document.createElement('span');
                cursor.className = 'glitch-text';
                cursor.innerHTML = "_";
                element.appendChild(cursor);

                while (i < text.length) {
                    let char = text.charAt(i);
                    let delay = baseSpeed;

                    // Pausas dramáticas por puntuación
                    if (char === '.' || char === '?' || char === '!') delay = 600;
                    if (char === ',') delay = 300;
                    
                    // Efecto de tartamudeo si la cordura es baja
                    if (State.sanity < 50 && Math.random() > 0.92) {
                        delay += 400;
                    }

                    // Inyectar el carácter antes del cursor
                    cursor.insertAdjacentHTML('beforebegin', char);
                    
                    i++;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    
                    // Auto-scroll para mantener el texto a la vista
                    const viewport = document.getElementById('viewport');
                    viewport.scrollTop = viewport.scrollHeight;
                }

                cursor.remove();
                State.isWriting = false;
                this.showChoices();
            },

            // 3. CARGA DE ESCENAS
            loadScene(sceneID) {
                const scene = StoryData[sceneID];
                if (!scene) return console.error("Error: Escena no encontrada ->", sceneID);

                State.currentScene = sceneID;
                
                // Limpiar el panel de acciones antes de la transición
                document.getElementById('action-panel').innerHTML = "";

                // Crear el contenedor del mensaje
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                document.getElementById('viewport').appendChild(messageDiv);

                // Ejecutar lógica específica de la escena (si existe)
                if (scene.onEnter) scene.onEnter();

                // Iniciar la narración
                this.typeWriter(messageDiv, scene.text);
                
                // Registrar en el log del sistema
                this.logSystem(`ENTRANDO_EN: ${sceneID.toUpperCase()}...`);
            },

            // 4. GESTIÓN DE OPCIONES (UI)
            showChoices() {
                const scene = StoryData[State.currentScene];
                const panel = document.getElementById('action-panel');
                panel.innerHTML = "";

                scene.choices.forEach(choice => {
                    // Verificar si la opción requiere un objeto o flag
                    if (choice.requirement && !State.flags.has(choice.requirement)) {
                        return; // No mostrar si no cumple requisitos
                    }

                    const btn = document.createElement('button');
                    btn.className = 'action-btn';
                    btn.innerHTML = choice.text;
                    btn.onclick = () => this.handleChoice(choice);
                    panel.appendChild(btn);
                });
            },

            handleChoice(choice) {
                if (State.isWriting) return;

                // Aplicar consecuencias de la decisión
                if (choice.sanityMod) this.adjustSanity(choice.sanityMod);
                if (choice.addFlag) State.flags.add(choice.addFlag);

                State.turnCount++;
                this.loadScene(choice.target);
            },

            // 5. SISTEMA DE ESTADÍSTICAS
            adjustSanity(amount) {
                State.sanity = Math.max(0, Math.min(100, State.sanity + amount));
                this.updateUI();

                if (State.sanity <= 0) {
                    this.triggerGameOver("Tu mente se ha fracturado. Ya no eres dueño de tus silencios.");
                }
            },

            updateUI() {
                const bar = document.getElementById('sanity-bar');
                const sync = document.getElementById('sync-value');
                const vignette = document.getElementById('main-vignette');

                bar.style.width = `${State.sanity}%`;
                sync.innerText = `${State.sync - (State.turnCount * 2)}%`;

                // La viñeta se cierra según baja la cordura
                const shadowIntensity = 100 - (State.sanity * 0.5);
                vignette.style.boxShadow = `inset 0 0 ${shadowIntensity * 3}px rgba(0,0,0,0.95)`;
                
                // Si la cordura es crítica, activar el glitch visual permanente
                if (State.sanity < 25) {
                    document.getElementById('master-container').classList.add('glitch-active');
                } else {
                    document.getElementById('master-container').classList.remove('glitch-active');
                }
            },

            logSystem(msg) {
                const log = document.getElementById('event-log');
                log.innerText = `> ${msg}`;
            },

            // Efecto de latido visual
            startPulse() {
                setInterval(() => {
                    const container = document.getElementById('master-container');
                    if (State.sanity < 40) {
                        container.style.borderColor = Math.random() > 0.5 ? '#8b0000' : '#1a1a1a';
                    }
                }, 1000);
            },

            triggerGameOver(reason) {
                // Se implementará en detalle en la Parte 15, pero dejamos la base
                document.body.innerHTML = `<div style="color:red; text-align:center; padding-top:20%;"><h1>CONEXIÓN PERDIDA</h1><p>${reason}</p></div>`;
            }
        };

        /**
         * ESTRUCTURA DE DATOS NARRATIVOS (StoryData)
         * Aquí almacenaremos los nodos de la historia.
         */
        const StoryData = {
            'limbo_inicial': {
                text: "Estás en un lugar donde la luz no se atreve a entrar. No hay arriba ni abajo, solo el sonido de tu propia respiración... que suena demasiado fuerte. Demasiado cerca de tu nuca.",
                choices: [
                    { text: "¿Hola? ¿Hay alguien?", target: 'primera_respuesta', sanityMod: -2 },
                    { text: Caminar en la oscuridad, target: 'pasillo_infinito', sanityMod: 0 }
                ]
            },
            'primera_respuesta': {
                text: "Tu voz no produce eco. En su lugar, algo bajo tus pies cruje. Al agacharte, tus manos tocan algo frío, metálico y pegajoso.",
                choices: [
                    { text: "Recoger el objeto", target: 'limbo_inicial', addFlag: 'objeto_misterioso' },
                    { text: "Alejarse rápidamente", target: 'pasillo_infinito', sanityMod: -5 }
                ]
            }
            // Las siguientes escenas se añadirán en la Parte 3...
        };

        // El arranque se hará cuando todo el script esté cargado
      /**
         * ================================================================
         * PARTE 3: AUDIO SINTÉTICO Y GESTIÓN DE OBJETOS
         * Aquí creamos el ambiente sonoro y la lógica de recolección.
         * ================================================================
         */

        const AudioEngine = {
            ctx: null,
            oscillator: null,
            gainNode: null,
            isInitialized: false,

            // Inicializa el contexto de audio (requiere interacción del usuario)
            init() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.gainNode = this.ctx.createGain();
                    this.gainNode.connect(this.ctx.destination);
                    this.isInitialized = true;
                    this.playAmbientDrone();
                } catch (e) {
                    console.error("Audio no soportado:", e);
                }
            },

            // Genera un zumbido de baja frecuencia que causa ansiedad
            playAmbientDrone() {
                if (!this.isInitialized) return;
                
                const osc = this.ctx.createOscillator();
                const filter = this.ctx.createBiquadFilter();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(40, this.ctx.currentTime); // 40Hz: Infrasonido inquietante
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(100, this.ctx.currentTime);

                osc.connect(filter);
                filter.connect(this.gainNode);
                
                this.gainNode.gain.setValueAtTime(0.05, this.ctx.currentTime);
                osc.start();

                // Modulación aleatoria del volumen (Efecto de respiración)
                setInterval(() => {
                    const vol = 0.02 + Math.random() * 0.05;
                    this.gainNode.gain.exponentialRampToValueAtTime(vol, this.ctx.currentTime + 2);
                }, 3000);
            },

            // Efecto de sonido de "click" metálico o estática
            playGlitchSound() {
                if (!this.isInitialized) return;
                
                const duration = 0.1;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(Math.random() * 400 + 100, this.ctx.currentTime);
                
                osc.connect(g);
                g.connect(this.ctx.destination);
                
                g.gain.setValueAtTime(0.1, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }
        };

        // Extensión del Motor para Inventario
        GameEngine.inventoryAdd = function(itemName, itemID) {
            if (State.inventory.length >= 3) {
                this.logSystem("INVENTARIO_LLENO: No puedes cargar más.");
                return false;
            }
            
            State.inventory.push({ name: itemName, id: itemID });
            this.updateInventoryUI();
            this.logSystem(`ADQUIRIDO: ${itemName.toUpperCase()}`);
            AudioEngine.playGlitchSound();
            return true;
        };

        GameEngine.updateInventoryUI = function() {
            const slots = document.querySelectorAll('.inv-slot');
            slots.forEach((slot, index) => {
                if (State.inventory[index]) {
                    slot.innerText = State.inventory[index].name.charAt(0);
                    slot.style.borderColor = "var(--blood-red)";
                    slot.title = State.inventory[index].name;
                } else {
                    slot.innerText = "?";
                    slot.style.borderColor = "#111";
                }
            });
        };

        /**
         * EXPANSIÓN DE STORYDATA: EL PASILLO DE LAS SOMBRAS
         * Añadimos nodos de navegación y eventos de cordura.
         */
        
        // Sobrescribimos/Ampliamos el objeto previo de StoryData
        Object.assign(StoryData, {
            'pasillo_infinito': {
                text: "El pasillo se extiende más allá de lo que tu vista permite. El papel tapiz aquí ha sido arrancado, revelando ladrillos que parecen latir. A lo lejos, una puerta de metal vibra violentamente.",
                choices: [
                    { text: "Acercarse a la puerta que vibra", target: 'puerta_metal', sanityMod: -5 },
                    { text: "Explorar el suelo en busca de algo útil", target: 'suelo_pasillo', sanityMod: 0 },
                    { text: "Regresar al inicio", target: 'limbo_inicial', sanityMod: -2 }
                ]
            },
            'suelo_pasillo': {
                text: "Te arrodillas. Entre las grietas de la madera podrida, algo brilla con un matiz aceitoso. Es una llave forjada en un material que parece hueso.",
                choices: [
                    { 
                        text: "Recoger la llave de hueso", 
                        target: 'pasillo_infinito', 
                        onSelect: () => GameEngine.inventoryAdd("Llave de Hueso", "llave_hueso")
                    },
                    { text: "Ignorarla, da mala espina", target: 'pasillo_infinito', sanityMod: -2 }
                ]
            },
            'puerta_metal': {
                text: "La puerta está ardiendo al tacto. Escuchas gritos del otro lado, pero no son humanos... suenan como frecuencias de radio chocando entre sí. Hay un ojo de cerradura pequeño y deforme.",
                choices: [
                    { 
                        text: "Usar la Llave de Hueso", 
                        target: 'sala_maquinas', 
                        requirement: 'llave_hueso',
                        sanityMod: +10 
                    },
                    { text: "Golpear la puerta", target: 'evento_golpe', sanityMod: -15 },
                    { text: "Huir del ruido", target: 'pasillo_infinito' }
                ]
            },
            'evento_golpe': {
                text: "Golpeas el metal. El ruido cesa instantáneamente. Un silencio tan absoluto que te duelen los oídos se apodera del lugar. Entonces, algo golpea de vuelta. Tres veces. Más fuerte que tú.",
                choices: [
                    { text: "Correr sin mirar atrás", target: 'pasillo_oscuro', sanityMod: -10 },
                    { text: "Pegar el oído a la puerta", target: 'muerte_oido', sanityMod: -50 }
                ]
            },
            'muerte_oido': {
                text: "Al acercarte, la puerta se convierte en líquido. Algo surge del vacío y te susurra una verdad que tu cerebro no puede procesar. La realidad se desmorona.",
                choices: [
                    { text: "Aceptar el fin", target: 'gameOver', onSelect: () => GameEngine.triggerGameOver("Tu curiosidad fue tu sentencia.") }
                ]
            }
        });

        // Modificamos el handleChoice para soportar onSelect
        const originalHandleChoice = GameEngine.handleChoice;
        GameEngine.handleChoice = function(choice) {
            // Inicializar audio en el primer click
            if (!AudioEngine.isInitialized) AudioEngine.init();
            
            if (choice.onSelect) choice.onSelect();
            
            // Lógica de requisitos de objetos
            if (choice.requirement) {
                const hasItem = State.inventory.some(item => item.id === choice.requirement);
                if (!hasItem) {
                    this.logSystem("REQUISITO_FALTANTE: " + choice.requirement);
                    return;
                }
            }
            
            originalHandleChoice.call(this, choice);
        };
      /**
         * ================================================================
         * PARTE 4: EL SISTEMA DE AMENAZA Y FLASHBACKS
         * Aquí introducimos la lógica de "La Entidad" y efectos 
         * visuales de distorsión procedimentales.
         * ================================================================
         */

        const ThreatEngine = {
            level: 0,
            timer: null,
            isActive: false,

            // Inicia el rastreo de la entidad
            startTracking() {
                if (this.isActive) return;
                this.isActive = true;
                this.timer = setInterval(() => this.increaseThreat(), 5000);
                GameEngine.logSystem("SISTEMA_DE_ALERTA_ACTIVO: Presencia detectada.");
            },

            increaseThreat() {
                // La amenaza sube más rápido si la cordura es baja
                const multiplier = State.sanity < 50 ? 2 : 1;
                this.level += 1 * multiplier;

                if (this.level > 30 && Math.random() > 0.7) {
                    VisualFX.triggerDistortion();
                }

                if (this.level > 70 && Math.random() > 0.8) {
                    VisualFX.showFlashback();
                }

                if (this.level >= 100) {
                    GameEngine.triggerGameOver("Te detuviste demasiado tiempo. Lo que sea que vive en las paredes finalmente te alcanzó.");
                }

                this.updateThreatUI();
            },

            resetThreat() {
                this.level = Math.max(0, this.level - 20);
                this.updateThreatUI();
            },

            updateThreatUI() {
                // El pulso del borde se vuelve más rojo y rápido
                const container = document.getElementById('master-container');
                if (this.level > 50) {
                    container.style.boxShadow = `0 0 ${this.level/2}px var(--blood-red)`;
                }
            }
        };

        const VisualFX = {
            // Genera un "flash" visual con un mensaje subliminal
            showFlashback() {
                const flash = document.createElement('div');
                flash.style.cssText = `
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: white;
                    z-index: 2000;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    mix-blend-mode: difference;
                `;
                
                const messages = ["NO ES REAL", "MIRA ATRÁS", "DÉJANOS ENTRAR", "HUELE A SANGRE"];

        const TerminalEngine = {
            isOpen: false,
            currentDirectory: 'ROOT',
            unlockedFiles: ['LEAME.txt'],
            passwords: { 'SISTEMA': '1987', 'CORREO': 'SILENCIO' },

            // Abre la interfaz de terminal sobre el viewport
            open() {
                this.isOpen = true;
                const viewport = document.getElementById('viewport');
                const actionPanel = document.getElementById('action-panel');
                
                // Ocultar controles normales
                actionPanel.style.display = 'none';

                    height: 100%;
                    border: 1px solid var(--terminal-green);
                    display: flex;
                    flex-direction: column;
                    text-shadow: 0 0 5px var(--terminal-green);
                `;

                termOverlay.innerHTML = `
                    <div id="term-output" style="flex-grow:1; overflow-y:auto; margin-bottom:10px;">
                        <p>[SISTEMA OPERATIVO 'VOID-OS' V.0.4.2]</p>
                        <p>Escribe 'ayuda' para ver los comandos disponibles.</p>
                    </div>
                    <div style="display:flex;">
                        <span>${this.currentDirectory}>&nbsp;</span>
                        <input type="text" id="term-input" autocomplete="off" autofocus 
                               style="background:transparent; border:none; color:inherit; 
                               outline:none; font-family:inherit; width:80%;">
                    </div>
                `;

                viewport.appendChild(termOverlay);
                
                const input = document.getElementById('term-input');
                input.focus();
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.processCommand(input.value);
                });

                GameEngine.logSystem("ACCESO_A_TERMINAL: Manual_Override_Enabled");
            },

            close() {
                this.isOpen = false;
                const term = document.getElementById('terminal-ui');
                if (term) term.remove();
                document.getElementById('action-panel').style.display = 'grid';
                GameEngine.logSystem("TERMINAL_CERRADA");
            },

            processCommand(rawCmd) {
                const output = document.getElementById('term-output');
                const input = document.getElementById('term-input');
                const cmd = rawCmd.toLowerCase().trim();
                
                const newLine = document.createElement('p');
                newLine.innerHTML = `<span style="color:#555;">> ${rawCmd}</span>`;
                output.appendChild(newLine);
                input.value = '';

                switch(cmd) {
                    case 'ayuda':
                        this.print('Comandos: ver, leer [archivo], desbloquear [pass], salir', output);
                        break;
                    case 'ver':
                        this.print(`Archivos en ${this.currentDirectory}: ${this.unlockedFiles.join(', ')}`, output);
                        break;
                    case 'salir':
                        this.close();
                        break;
                    default:
                        if (cmd.startsWith('leer ')) {
                            this.readFile(cmd.split(' ')[1], output);
                        } else if (cmd.startsWith('desbloquear ')) {
                            this.unlock(cmd.split(' ')[1], output);
                        } else {
                            this.print('Comando no reconocido o corrupto.', output);
                        }
                }
                output.scrollTop = output.scrollHeight;
            },

            print(text, target) {
                const p = document.createElement('p');
                p.innerText = text;
                target.appendChild(p);
            },

            readFile(fileName, output) {
                if (!fileName) return this.print('¿Qué archivo quieres leer?', output);
                
                const files = {
                    'leame.txt': "Este lugar no fue construido para los vivos. Si estás leyendo esto, el protocolo de sincronización falló. No mires a las paredes directamente.",
                    'bitacora.log': "Día 44: Los susurros ahora tienen nombres. Saben quién soy. El ascensor es la única salida, pero requiere tres núcleos de energía.",
                    'secreto.dat': "[DATOS CORRUPTOS] ...el código de la puerta del sótano es 4-2-0-9..."
                };

                const content = files[fileName.toLowerCase()];
                if (content && this.unlockedFiles.includes(fileName.toUpperCase())) {
                    this.print(`[CONTENIDO]: ${content}`, output);
                } else {
                    this.print('Archivo no encontrado o acceso denegado.', output);
                }
            },

            unlock(pass, output) {
                if (pass === this.passwords['SISTEMA']) {
                    this.unlockedFiles.push('BITACORA.LOG', 'SECRETO.DAT');
                    this.print('ACCESO CONCEDIDO: Nuevos archivos disponibles.', output);
                    State.sync += 5;

                } else {
                    this.print('CONTRASEÑA INCORRECTA. Intento registrado.', output);
                    State.sanity -= 2;
                    GameEngine.updateUI();
                }
            }
        };

                battleScreen.style.cssText = `
                    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(139, 0, 0, 0.1);
                    display: flex; flex-direction: column; justify-content: center;
                    align-items: center; z-index: 1500; backdrop-filter: blur(4px);
                `;

                battleScreen.innerHTML = `
                    <div style="text-align:center; margin-bottom: 20px;">
                        <h2 class="glitch-active" style="color:white; letter-spacing:10px;">RESISTE</h2>
                        <p style="font-size:0.8rem;">Haz clic rítmicamente para mantener la voluntad</p>

                // El clic en cualquier parte de la pantalla aumenta el progreso
                battleScreen.onclick = () => this.handlePulse();
            },

            handlePulse() {
                if (!this.isActive) return;
                
                // Cada clic sube el progreso basándose en la dificultad
                const boost = 12 / this.difficulty;
                this.progress = Math.min(100, this.progress + boost);
                this.updateUI();
                AudioEngine.playGlitchSound();

                if (this.progress >= 95) {
                    this.win();
                }
            },

            startDrain() {
                // El progreso baja constantemente (la entidad te arrastra)
                this.interval = setInterval(() => {
                    const drain = 2 * this.difficulty;
                    this.progress -= drain;
                    this.updateUI();

                    if (this.progress <= 0) {
                        this.lose();
                    }
                }, 100);
            },

            updateUI() {
                const bar = document.getElementById('battle-bar');
                const status = document.getElementById('battle-status');
                if (bar) bar.style.width = `${this.progress}%`;
                
                if (this.progress < 30) {
                    status.innerText = "ESTADO: COLAPSANDO";
                    status.style.color = "red";
                } else {
                    status.innerText = "ESTADO: LUCHANDO";
                    status.style.color = "white";
                }
            },

            win() {
                this.end(true);
                GameEngine.logSystem("AMENAZA_RECHAZADA: La voluntad prevalece.");
                GameEngine.loadScene('victoria_encuentro');

            lose() {
                this.end(false);
                GameEngine.triggerGameOver("Tu mente cedió ante la presión. El vacío te ha reclamado.");

                this.isActive = false;

                    this.noiseNode.connect(this.gainNode);
                    this.gainNode.connect(AudioEngine.ctx.destination);
                    this.noiseNode.start();
                }

                // Volumen basado en la pérdida de Sincronización

        window.onload = () => {
            PersistenceEngine.load();
            GameEngine.loadScene(State.currentScene || 'despertar');
            
            // Si el usuario vuelve tras el epílogo, el sistema está "limpio"
            if (!localStorage.getItem('omega_memory')) {
                console.log("Sujeto liberado. Memoria volátil activa.");
            }
        };

        // Cerramos el motor.
        console.log("PROJECT_OMEGA: Engine Status [STABLE]. Total Lines: ~3900.");
</script>
